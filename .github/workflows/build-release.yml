name: Build and Package

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-worker:
    name: Build Rust worker (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            os: windows-latest
            artifact_name: aicp-rust-worker.exe
            worker_path: rust_worker/target/release/aicp-rust-worker.exe
          - platform: linux-x86_64
            os: ubuntu-latest
            artifact_name: aicp-rust-worker
            worker_path: rust_worker/target/release/aicp-rust-worker
          - platform: linux-aarch64
            os: ubuntu-24.04-arm
            artifact_name: aicp-rust-worker
            worker_path: rust_worker/target/release/aicp-rust-worker
          - platform: darwin-x86_64
            os: macos-15-intel
            artifact_name: aicp-rust-worker
            worker_path: rust_worker/target/release/aicp-rust-worker
          - platform: darwin-aarch64
            os: macos-14
            artifact_name: aicp-rust-worker
            worker_path: rust_worker/target/release/aicp-rust-worker

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build worker
        run: cargo build --release --manifest-path rust_worker/Cargo.toml

      - name: Prepare worker artifact
        shell: bash
        run: |
          mkdir -p "worker/${{ matrix.platform }}"
          cp "${{ matrix.worker_path }}" "worker/${{ matrix.platform }}/${{ matrix.artifact_name }}"

      - name: Upload worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-${{ matrix.platform }}
          path: worker/${{ matrix.platform }}/*
          if-no-files-found: error

  build-python-package:
    name: Build Python package with workers
    needs: build-worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download worker artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-workers

      - name: Install worker binaries into package tree
        shell: bash
        run: |
          set -eux
          mkdir -p aicodeprep_gui/rust/bin
          for artifact_dir in downloaded-workers/worker-*; do
            platform="${artifact_dir##*/worker-}"
            mkdir -p "aicodeprep_gui/rust/bin/${platform}"
            cp "${artifact_dir}"/* "aicodeprep_gui/rust/bin/${platform}/"
            chmod +x "aicodeprep_gui/rust/bin/${platform}/"* || true
          done
          find aicodeprep_gui/rust/bin -maxdepth 3 -type f -print

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload Python package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Attach package to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-python-package
    runs-on: ubuntu-latest

    steps:
      - name: Download Python package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "AICodePrep GUI release ${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" dist/* --clobber
